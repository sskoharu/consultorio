<ion-content [fullscreen]="true" class="register-cita-content">
  <ion-grid>
    <ion-row class="ion-justify-content-center">
      <ion-col size="12" size-md="8" size-lg="6">

        <div class="step-container fade-in">
          <div class="step-badge">1</div>
          <ion-card class="modern-step-card">
            <ion-card-header>
              <ion-card-title class="dark-title">Información de la Consulta</ion-card-title>
            </ion-card-header>
            <ion-card-content>
              <ion-item lines="none" class="custom-input-box">
                <ion-label position="stacked" class="dark-label">Motivo</ion-label>
                <ion-input [(ngModel)]="motivo" placeholder="Ej. Limpieza o Dolor" class="dark-text-input"></ion-input>
                <ion-icon name="chatbubble-outline" slot="end" color="primary"></ion-icon>
              </ion-item>

              <ion-item lines="none" class="custom-input-box ion-margin-top">
                <ion-label position="stacked" class="dark-label">Odontólogo de preferencia</ion-label>
                <ion-select [(ngModel)]="odontologo" placeholder="Seleccione un profesional" class="dark-select">
                  <ion-select-option [value]="1">Dr. Sebastián - General</ion-select-option>
                  <ion-select-option [value]="2">Dra. Elena - Ortodoncia</ion-select-option>
                </ion-select>
                <ion-icon name="person-outline" slot="end" color="primary"></ion-icon>
              </ion-item>
            </ion-card-content>
          </ion-card>
        </div>

        <div class="step-container fade-in" style="animation-delay: 0.2s;">
          <div class="step-badge">2</div>
          <ion-card class="modern-step-card calendar-card">
            <ion-card-header>
              <ion-card-title>Fecha y Horario</ion-card-title>
            </ion-card-header>
            <ion-datetime presentation="date-time" [min]="fechaMinima" (ionChange)="validarFecha($event)"
              hour-cycle="h23" minuteValues="0" hourValues="10,11,12,13,14,15,16,17,18" class="styled-datetime">
            </ion-datetime>
          </ion-card>
        </div>

        <div class="footer-actions fade-in" style="animation-delay: 0.4s;">
          <div class="selected-info" *ngIf="fechaHoraFormateada">
            <p>Agendando para el: <strong>{{ fechaHoraFormateada }}</strong></p>
          </div>
          <p *ngIf="mensajeHorasDisponibles" class="disponibilidad-msg ion-text-center">
            {{ mensajeHorasDisponibles }}
          </p>

          <ion-button expand="block" class="main-confirm-btn" (click)="guardarCita()">
            RESERVAR AHORA
          </ion-button>

          <ion-button fill="clear" class="btn-cancelar-ultra" (click)="regresar()">
            CANCELAR Y VOLVER
          </ion-button>
        </div>

      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
