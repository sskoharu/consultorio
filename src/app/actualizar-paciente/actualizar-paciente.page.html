<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-title>Mi Perfil</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cerrarModal()">
        <ion-icon slot="icon-only" name="close-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding edit-profile-content">
  <div class="avatar-header ion-text-center fade-in">
    <h2>Actualizar Información</h2>
    <p>Mantén tus datos de contacto al día</p>
  </div>

  <ion-card class="form-card-edit fade-in">
    <ion-card-content>
      <ion-item lines="none" class="input-modern-edit">
        <ion-icon name="id-card-outline" slot="start"></ion-icon>
        <ion-label position="stacked">Cédula</ion-label>
        <ion-input placeholder="Cédula" [(ngModel)]="txt_cedula" name="cedula" ngDefaultControl readonly="true"></ion-input>
      </ion-item>

      <ion-row>
        <ion-col size="6">
          <ion-item lines="none" class="input-modern-edit">
            <ion-label position="stacked">Nombre</ion-label>
            <ion-input placeholder="Nombre" [(ngModel)]="txt_nombre" name="nombre" ngDefaultControl></ion-input>
          </ion-item>
        </ion-col>
        <ion-col size="6">
          <ion-item lines="none" class="input-modern-edit">
            <ion-label position="stacked">Apellido</ion-label>
            <ion-input placeholder="Apellido" [(ngModel)]="txt_apellido" name="apellido" ngDefaultControl></ion-input>
          </ion-item>
        </ion-col>
      </ion-row>

      <ion-item lines="none" class="input-modern-edit">
        <ion-icon name="fitness-outline" slot="start"></ion-icon>
        <ion-label position="stacked">Edad</ion-label>
        <ion-input type="number" placeholder="Edad" [(ngModel)]="txt_edad" name="edad" ngDefaultControl></ion-input>
      </ion-item>

      <ion-item lines="none" class="input-modern-edit">
        <ion-icon name="call-outline" slot="start"></ion-icon>
        <ion-label position="stacked">Teléfono</ion-label>
        <ion-input type="tel" placeholder="Teléfono" [(ngModel)]="txt_telefono" name="telefono" ngDefaultControl></ion-input>
      </ion-item>

      <ion-item lines="none" class="input-modern-edit">
        <ion-icon name="mail-outline" slot="start"></ion-icon>
        <ion-label position="stacked">Correo Electrónico</ion-label>
        <ion-input type="email" placeholder="Correo" [(ngModel)]="txt_correo" name="correo" ngDefaultControl></ion-input>
      </ion-item>

      <ion-item lines="none" class="input-modern-edit">
        <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
        <ion-label position="stacked">Nueva Contraseña</ion-label>
        <ion-input type="password" placeholder="Escriba nueva contraseña" name="contrasena" [(ngModel)]="txt_contrasena" ngDefaultControl></ion-input>
      </ion-item>

      <div class="button-group-edit">
        <ion-button expand="block" color="primary" class="btn-update" (click)="actualizarPaciente()">
          <ion-icon name="checkmark-circle-outline" slot="start"></ion-icon>
          Guardar Cambios
        </ion-button>
        
        <ion-button expand="block" fill="clear" color="medium" (click)="cerrarModal()">
          Cancelar
        </ion-button>
      </div>
    </ion-card-content>
  </ion-card>
</ion-content>
